apiVersion: v1
kind: Namespace
metadata:
  name: writefreely
---
# 1. 配置文件 - 在这里直接定义你的 config.ini 内容
apiVersion: v1
kind: ConfigMap
metadata:
  name: wf-config
  namespace: writefreely
data:
  config.ini: |
    [server]
    port     = 8080
    bind     = 0.0.0.0
    host     = https://blog.yourdomain.com
    keys_parent_dir = /data/keys
    [database]
    type     = mysql
    host     = db:3306
    name     = writefreely
    user     = writefreely
    password = P@ssw0rd
    [app]
    site_name = My Blog
    single_user = true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wf-app-pvc
  namespace: writefreely
spec:
  accessModes: [ReadWriteOnce]
  resources: {requests: {storage: 1Gi}}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wf-db-pvc
  namespace: writefreely
spec:
  accessModes: [ReadWriteOnce]
  resources: {requests: {storage: 2Gi}}
---
# 2. 数据库
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: writefreely
spec:
  ports: [{port: 3306}]
  selector: {app: mariadb}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: writefreely-mariadb
  namespace: writefreely
spec:
  selector: {matchLabels: {app: mariadb}}
  template:
    metadata: {labels: {app: mariadb}}
    spec:
      containers:
        - name: mariadb
          image: lscr.io/linuxserver/mariadb:latest
          env:
            - name: MYSQL_DATABASE
              value: "writefreely"
            - name: MYSQL_USER
              value: "writefreely"
            - name: MYSQL_PASSWORD
              value: "P@ssw0rd"
          volumeMounts:
            - name: db-data
              mountPath: /config
      volumes:
        - name: db-data
          persistentVolumeClaim: {claimName: wf-db-pvc}
---
# 3. WriteFreely 应用
apiVersion: v1
kind: Service
metadata:
  name: writefreely-svc
  namespace: writefreely
spec:
  ports: [{port: 80, targetPort: 8080}]
  selector: {app: writefreely}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: writefreely
  namespace: writefreely
spec:
  strategy: {type: Recreate}
  selector: {matchLabels: {app: writefreely}}
  template:
    metadata: {labels: {app: writefreely}}
    spec:
      securityContext: {runAsUser: 0, fsGroup: 0}
      containers:
        - name: app
          image: ghcr.io/writefreely/writefreely:main
          # 关键修改 1：设置工作目录为 /data
          workingDir: /data
          ports: [{containerPort: 8080}]
          volumeMounts:
            - name: app-data
              mountPath: /data
            # 关键修改 2：将 ConfigMap 里的 config.ini 挂载到 /data/config.ini
            - name: config-file
              mountPath: /data/config.ini
              subPath: config.ini
      volumes:
        - name: app-data
          persistentVolumeClaim: {claimName: wf-app-pvc}
        - name: config-file
          configMap:
            name: wf-config
---
# 4. Ingress (保持不变)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: writefreely-ingress
  namespace: writefreely
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts: [blog.yourdomain.com]
      secretName: writefreely-tls
  rules:
    - host: blog.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: writefreely-svc
                port: {number: 80}
